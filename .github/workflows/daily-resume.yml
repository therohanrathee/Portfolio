name: Daily Resume Generator & Deploy

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch: # Allow manual trigger from the GitHub Actions UI
    inputs:
      job_title:
        description: 'Target Job Title for Resume Customization'
        required: true
        default: 'Full Stack & iOS Developer'
      show_summary:
        description: 'Include Summary Section'
        type: boolean
        required: true
        default: true
      show_responsibility:
        description: 'Include Positions of Responsibility'
        type: boolean
        required: true
        default: true
      show_extracurriculars:
        description: 'Include Extra-Curricular Activities'
        type: boolean
        required: true
        default: true

permissions:
  contents: write # Required to commit the updated resume and deploy static pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Generate PDF Resume
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JOB_TITLE: ${{ github.event.inputs.job_title }}
          SHOW_SUMMARY: ${{ github.event.inputs.show_summary }}
          SHOW_RESPONSIBILITY: ${{ github.event.inputs.show_responsibility }}
          SHOW_EXTRACURRICULARS: ${{ github.event.inputs.show_extracurriculars }}
        run: npx tsx scripts/generate-resume.ts

      - name: Commit and Push Resume PDF & Settings
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/resume.pdf public/target-role.txt public/resume-config.json
          if git diff --staged --quiet; then
            echo "No changes in resume, config, or target role file"
          else
            git commit -m "chore: auto-update daily resume and settings [skip actions]"
            git push origin main
          fi

      - name: Build static site
        run: |
          npm run build
          cp vercel.json ./out/ || true
        env:
          GITHUB_ACTIONS: true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
